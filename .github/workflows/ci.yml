name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore CustomerCrudApi.sln

      - name: Build
        run: dotnet build CustomerCrudApi.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test CustomerCrudApi.Tests/CustomerCrudApi.Tests.csproj --no-build --configuration Release --verbosity normal
